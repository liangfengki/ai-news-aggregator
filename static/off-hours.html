<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 资讯 — 非服务时段</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    .icon { font-size: 4rem; margin-bottom: 24px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ffffff;
    }
    .hours {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 20px 0;
    }
    p { color: #888; line-height: 1.6; margin-bottom: 8px; }
    .countdown {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #aaa;
    }
    .countdown strong { color: #667eea; }
    .note {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #1a1a2e;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
  <meta http-equiv="refresh" content="300">
</head>
<body>
  <div class="container">
    <div class="icon">🌙</div>
    <h1>AI 资讯看板</h1>
    <div class="hours">08:00 — 18:00</div>
    <p>当前为非服务时段</p>
    <p>服务开放时间为北京时间 每天 08:00 - 18:00</p>
    <div class="countdown" id="countdown"></div>
    <div class="note">
      页面每 5 分钟自动刷新，届时将自动跳转至看板
    </div>
  </div>
  <script>
    (function() {
      function update() {
        var now = new Date();
        var utc8 = new Date(now.getTime() + (8 * 60 - now.getTimezoneOffset()) * 60000);
        var h = utc8.getHours(), m = utc8.getMinutes(), s = utc8.getSeconds();
        var el = document.getElementById('countdown');
        if (h >= 8 && h < 18) {
          el.innerHTML = '服务已开放，正在跳转...';
          setTimeout(function() { location.reload(); }, 2000);
          return;
        }
        var target = new Date(utc8);
        if (h >= 18) {
          target.setDate(target.getDate() + 1);
        }
        target.setHours(8, 0, 0, 0);
        var diff = target - utc8;
        var hh = Math.floor(diff / 3600000);
        var mm = Math.floor((diff % 3600000) / 60000);
        var ss = Math.floor((diff % 60000) / 1000);
        el.innerHTML = '距离开放还有 <strong>' +
          String(hh).padStart(2,'0') + ':' +
          String(mm).padStart(2,'0') + ':' +
          String(ss).padStart(2,'0') + '</strong>';
      }
      update();
      setInterval(update, 1000);
    })();
  </script>
</body>
</html>
